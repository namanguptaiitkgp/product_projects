<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Case Study — Digio Selfie Service · Light Mode</title>
  <meta name="description" content="Light-mode remix of the ten-slide cinematic case study of the Digio Selfie Service: the frontend defenses, the backend pipeline, and the configurable control surface." />
  <link rel="stylesheet" href="cinematic-light.css" />
  <link rel="stylesheet" href="selfie-light.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Case Study · Selfie Service · Light">
  <div id="root"></div>
  <script type="text/babel" src="stage.jsx"></script>
  <script type="text/babel" src="selfie-scenes-a.jsx"></script>
  <script type="text/babel" src="selfie-scenes-b.jsx"></script>
  <script type="text/babel" src="selfie-app.jsx"></script>
  <script>
    // Lightbox gallery — click any .zoomable to view the full original frame,
    // then navigate the set with ← / → (or the on-screen arrows).
    (function () {
      let box = null;
      let items = [];   // [{ full, cap }]
      let idx = 0;

      function close() {
        if (!box) return;
        const el = box;
        box = null;
        el.classList.remove('open');
        setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 300);
      }

      function render() {
        if (!box) return;
        const it = items[idx];
        const img = box.querySelector('.lb-img');
        img.classList.remove('swap');
        void img.offsetWidth;
        img.classList.add('swap');
        img.src = it.full;
        box.querySelector('.lb-cap').innerHTML =
          (it.cap || 'Original frame') +
          '<span class="sub">Full uncropped detector output</span>';
        box.querySelector('.lb-count').textContent =
          String(idx + 1).padStart(2, '0') + ' / ' + String(items.length).padStart(2, '0');
        const single = items.length < 2;
        box.querySelector('.lb-prev').style.display = single ? 'none' : '';
        box.querySelector('.lb-next').style.display = single ? 'none' : '';
      }

      function go(delta) {
        if (!box || !items.length) return;
        idx = (idx + delta + items.length) % items.length;
        render();
      }

      function open(list, start) {
        close();
        items = list;
        idx = start;
        box = document.createElement('div');
        box.className = 'lightbox';
        box.innerHTML =
          '<button class="lb-close" aria-label="Close">\u00d7</button>' +
          '<button class="lb-nav lb-prev" aria-label="Previous">\u2039</button>' +
          '<div class="lb-stage"><img class="lb-img" alt="Full detection frame" /></div>' +
          '<button class="lb-nav lb-next" aria-label="Next">\u203a</button>' +
          '<div class="lb-foot"><div class="lb-cap"></div><div class="lb-count"></div></div>';
        document.body.appendChild(box);
        void box.offsetWidth;
        box.classList.add('open');
        render();

        box.addEventListener('click', function (e) {
          if (e.target.closest('.lb-nav') || e.target.classList.contains('lb-img')) return;
          close();
        });
        box.querySelector('.lb-prev').addEventListener('click', function (e) { e.stopPropagation(); go(-1); });
        box.querySelector('.lb-next').addEventListener('click', function (e) { e.stopPropagation(); go(1); });
        box.querySelector('.lb-close').addEventListener('click', function (e) { e.stopPropagation(); close(); });
      }

      // Delegate clicks (images are rendered by React)
      document.addEventListener('click', function (e) {
        const z = e.target.closest && e.target.closest('.zoomable');
        if (!z) return;
        e.preventDefault();
        e.stopPropagation();
        // Build the gallery from every zoomable in the same scene, in DOM order
        const scope = z.closest('.scene') || document;
        const all = Array.prototype.slice.call(scope.querySelectorAll('.zoomable'));
        const list = all.map(function (el) {
          return { full: el.getAttribute('data-full'), cap: el.getAttribute('data-cap') };
        });
        open(list, all.indexOf(z));
      });

      // Keyboard: Esc closes, ←/→ navigate. Swallow keys so the deck doesn't
      // navigate underneath the open lightbox.
      document.addEventListener('keydown', function (e) {
        if (!box) return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowRight') go(1);
        else if (e.key === 'ArrowLeft') go(-1);
        e.stopPropagation();
        e.preventDefault();
      }, true);
    })();
  </script>
</body>
</html>
